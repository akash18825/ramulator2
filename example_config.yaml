Frontend:
  impl: ReadWriteTrace
  path: trace_files/ramulator_trace.trace
  clock_ratio: 1
  num_expected_insts: 10000

  Translation:
    impl: RandomTranslation
    max_addr: 2147483648
              

MemorySystem:
  impl: GenericDRAM
  clock_ratio: 2

  DRAM:
    impl: DDR4
    org:
      preset: DDR4_8Gb_x8
    timing:
      preset: DDR4_2400R

  Controller:
    impl: Generic
    Scheduler:
      impl: FRFCFS
    RefreshManager:
      impl: AllBank
    RowPolicy:
      impl: OpenRowPolicy

  AddrMapper:
    impl: RoBaRaCoCh